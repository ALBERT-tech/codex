<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Крестики-нолики v3</title>
  <style>
    :root {
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(150deg, #e0f2fe, #f5f3ff 45%, #fee2e2);
      color: #0f172a;
      padding: 16px;
    }

    .game {
      width: min(94vw, 390px);
      background: #ffffff;
      border-radius: 18px;
      border: 6px solid #dc2626;
      box-shadow: 0 16px 30px rgba(15, 23, 42, 0.15);
      padding: 22px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 1.6rem;
    }

    .version {
      margin: 6px 0 12px;
      font-size: 0.9rem;
      font-weight: 700;
      color: #991b1b;
    }

    .status {
      margin: 0 0 14px;
      font-weight: 600;
      color: #334155;
      min-height: 24px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .cell {
      border: none;
      border-radius: 12px;
      aspect-ratio: 1;
      font-size: 2rem;
      font-weight: 800;
      cursor: pointer;
      color: #0f172a;
      background: #e2e8f0;
      transition: transform 0.12s ease, background-color 0.12s ease;
    }

    .cell:hover:enabled {
      transform: translateY(-1px);
      background: #cbd5e1;
    }

    .cell:disabled {
      cursor: not-allowed;
      opacity: 0.92;
    }

    .reset {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      background: #4f46e5;
      color: #fff;
      cursor: pointer;
    }

    .reset:hover {
      background: #4338ca;
    }
  </style>
</head>
<body>
  <main class="game">
    <h1>Крестики-нолики</h1>
    <p class="version">Сборка: v3 (полная пересборка)</p>
    <p class="status" id="status">Ваш ход (X)</p>
    <section class="board" id="board" aria-label="Игровое поле"></section>
    <button class="reset" id="reset" type="button">Начать заново</button>
  </main>

  <script>
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const resetEl = document.getElementById('reset');

    const WIN_LINES = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8],
      [0, 3, 6], [1, 4, 7], [2, 5, 8],
      [0, 4, 8], [2, 4, 6]
    ];

    let board = Array(9).fill('');
    let currentPlayer = 'X';
    let gameOver = false;
    let aiPending = false;

    function checkWinner() {
      for (const [a, b, c] of WIN_LINES) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return board[a];
        }
      }
      if (board.every(Boolean)) {
        return 'draw';
      }
      return null;
    }

    function findLineMove(player) {
      for (const [a, b, c] of WIN_LINES) {
        const line = [board[a], board[b], board[c]];
        const count = line.filter(value => value === player).length;
        const emptyCell = [a, b, c].find(index => !board[index]);
        if (count === 2 && emptyCell !== undefined) {
          return emptyCell;
        }
      }
      return null;
    }

    function getAiMove() {
      const win = findLineMove('O');
      if (win !== null) return win;

      const block = findLineMove('X');
      if (block !== null) return block;

      if (!board[4]) return 4;

      const corners = [0, 2, 6, 8].filter(index => !board[index]);
      if (corners.length) {
        return corners[Math.floor(Math.random() * corners.length)];
      }

      const free = board.map((v, i) => (v ? null : i)).filter(v => v !== null);
      return free[Math.floor(Math.random() * free.length)];
    }

    function render() {
      boardEl.innerHTML = '';

      board.forEach((value, index) => {
        const cell = document.createElement('button');
        cell.className = 'cell';
        cell.type = 'button';
        cell.textContent = value;
        cell.setAttribute('aria-label', `Клетка ${index + 1}`);
        cell.disabled = Boolean(value) || gameOver || currentPlayer === 'O' || aiPending;
        cell.addEventListener('click', () => makeMove(index));
        boardEl.appendChild(cell);
      });
    }

    function updateStatus(result) {
      if (result === 'draw') {
        statusEl.textContent = 'Ничья!';
        return;
      }
      if (result === 'X' || result === 'O') {
        statusEl.textContent = `Победил игрок ${result}!`;
        return;
      }
      statusEl.textContent = currentPlayer === 'X' ? 'Ваш ход (X)' : 'Ход компьютера (O)';
    }

    function makeAiMove() {
      if (gameOver || currentPlayer !== 'O') return;

      const index = getAiMove();
      aiPending = false;
      makeMove(index, true);
    }

    function makeMove(index, fromAi = false) {
      if (
        board[index] ||
        gameOver ||
        aiPending ||
        (currentPlayer === 'O' && !fromAi)
      ) {
        return;
      }

      board[index] = currentPlayer;
      const result = checkWinner();

      if (result) {
        gameOver = true;
        updateStatus(result);
        render();
        return;
      }

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      updateStatus(null);
      render();

      if (currentPlayer === 'O') {
        aiPending = true;
        statusEl.textContent = 'Ход компьютера (O)';
        render();
        window.setTimeout(makeAiMove, 350);
      }
    }

    function resetGame() {
      board = Array(9).fill('');
      currentPlayer = 'X';
      gameOver = false;
      aiPending = false;
      updateStatus(null);
      render();
    }

    resetEl.addEventListener('click', resetGame);
    render();
  </script>
</body>
</html>
